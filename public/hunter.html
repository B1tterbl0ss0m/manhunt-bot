<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hunter Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    #map { height: 100vh; }

    /* Runner markers */
    .runner-yellow {
      width: 26px;
      height: 26px;
      background: #FFD500;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    .runner-red {
      width: 26px;
      height: 26px;
      background: red;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      color: white;
    }

    /* Hunter markers */
    .hunter-lightblue {
      width: 18px;
      height: 18px;
      background: #66B2FF;
      border-radius: 50%;
      border: 2px solid white;
    }

    .hunter-darkblue {
      width: 20px;
      height: 20px;
      background: #0050FF;
      border-radius: 50%;
      border: 2px solid white;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // ---------------------------------------------------------
  // FIREBASE CONFIG
  // ---------------------------------------------------------
  const firebaseConfig = {
    apiKey: "...",
    authDomain: "manhunt-e6f98.firebaseapp.com",
    databaseURL: "https://manhunt-e6f98-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "manhunt-e6f98",
    storageBucket: "manhunt-e6f98.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ---------------------------------------------------------
  // URL PARAMETERS
  // ---------------------------------------------------------
  const params = new URLSearchParams(location.search);
  const eventId = params.get("event") || "testEvent";
  const myHunterId = params.get("me") || null;

  // ---------------------------------------------------------
  // MAP INITIALIZATION
  // ---------------------------------------------------------
  const map = L.map('map').setView([47.05, 8.30], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const runnerMarkers = {};
  const hunterMarkers = {};

  function removeMarker(store, id) {
    if (store[id]) {
      map.removeLayer(store[id]);
      delete store[id];
    }
  }

  // ---------------------------------------------------------
  // RUNNERS (YELLOW OR RED IF LIVE MODE)
  // ---------------------------------------------------------
  onValue(ref(db, `events/${eventId}/runners`), snapshot => {
    const data = snapshot.val() || {};

    // Remove markers for runners that no longer exist
    for (const id in runnerMarkers) {
      if (!data[id]) {
        removeMarker(runnerMarkers, id);
      }
    }

    // Update existing runners
    for (const id in data) {
      const runner = data[id];
      const status = runner.status || "active";

      if (status !== "active" || !runner.latest) {
        removeMarker(runnerMarkers, id);
        continue;
      }

      const { lat, lng } = runner.latest;
      const number = id.replace("runner", "");
      const isLive = runner.liveMode === true;

      const html = isLive
        ? `<div class="runner-red">${number}</div>`
        : `<div class="runner-yellow">${number}</div>`;

      if (!runnerMarkers[id]) {
        runnerMarkers[id] = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html,
            iconSize: [26, 26],
            iconAnchor: [13, 13]
          })
        }).addTo(map);
      } else {
        runnerMarkers[id].setLatLng([lat, lng]);
        runnerMarkers[id].setIcon(
          L.divIcon({
            className: "",
            html,
            iconSize: [26, 26],
            iconAnchor: [13, 13]
          })
        );
      }
    }
  });

  // ---------------------------------------------------------
  // HUNTERS (LIGHT BLUE OR DARK BLUE IF SELF)
  // ---------------------------------------------------------
  onValue(ref(db, `events/${eventId}/hunters`), snapshot => {
    const data = snapshot.val() || {};

    // Remove markers for hunters that no longer exist
    for (const id in hunterMarkers) {
      if (!data[id]) {
        removeMarker(hunterMarkers, id);
      }
    }

    // Update existing hunters
    for (const id in data) {
      const hunter = data[id];
      const latest = hunter.latest;

      if (!latest) {
        removeMarker(hunterMarkers, id);
        continue;
      }

      const { lat, lng } = latest;
      const isMe = (id === myHunterId);

      const html = isMe
        ? `<div class="hunter-darkblue"></div>`
        : `<div class="hunter-lightblue"></div>`;

      if (!hunterMarkers[id]) {
        hunterMarkers[id] = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html,
            iconSize: isMe ? [20, 20] : [18, 18],
            iconAnchor: isMe ? [10, 10] : [9, 9]
          })
        }).addTo(map);
      } else {
        hunterMarkers[id].setLatLng([lat, lng]);
        hunterMarkers[id].setIcon(
          L.divIcon({
            className: "",
            html,
            iconSize: isMe ? [20, 20] : [18, 18],
            iconAnchor: isMe ? [10, 10] : [9, 9]
          })
        );
      }
    }
  });

</script>

</body>
</html>
