<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hunter Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    #map { height: 100vh; }

    .yellow-runner {
      width: 26px;
      height: 26px;
      background: #FFD500;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    .hunter-red {
      width: 16px;
      height: 16px;
      background: red;
      border-radius: 50%;
      border: 2px solid white;
    }

    .hunter-blue {
      width: 18px;
      height: 18px;
      background: blue;
      border-radius: 50%;
      border: 2px solid white;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // ---------------------------------------------------------
  // FIREBASE CONFIG
  // ---------------------------------------------------------
  const firebaseConfig = {
    apiKey: "...",
    authDomain: "manhunt-e6f98.firebaseapp.com",
    databaseURL: "https://manhunt-e6f98-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "manhunt-e6f98",
    storageBucket: "manhunt-e6f98.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ---------------------------------------------------------
  // URL PARAMETERS
  // ---------------------------------------------------------
  const params = new URLSearchParams(location.search);
  const eventId = params.get("event") || "testEvent";
  const myHunterId = params.get("me") || null;   // <--- NEW

  // ---------------------------------------------------------
  // MAP INITIALIZATION
  // ---------------------------------------------------------
  const map = L.map('map').setView([47.05, 8.30], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const runnerMarkers = {};
  const hunterMarkers = {};

  function removeMarker(store, id) {
    if (store[id]) {
      map.removeLayer(store[id]);
      delete store[id];
    }
  }

  // ---------------------------------------------------------
  // RUNNERS (YELLOW WITH NUMBER)
  // ---------------------------------------------------------
  onValue(ref(db, `events/${eventId}/runners`), snapshot => {
    const data = snapshot.val();
    if (!data) return;

    for (const id in data) {
      const runner = data[id];
      const status = runner.status || "active";

      if (status !== "active") {
        removeMarker(runnerMarkers, id);
        continue;
      }

      if (!runner.latest) {
        removeMarker(runnerMarkers, id);
        continue;
      }

      const { lat, lng } = runner.latest;

      // Extract runner number (runner3 → 3)
      const number = id.replace("runner", "");

      if (!runnerMarkers[id]) {
        runnerMarkers[id] = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html: `<div class="yellow-runner">${number}</div>`,
            iconSize: [26, 26],
            iconAnchor: [13, 13]
          })
        }).addTo(map);
      } else {
        runnerMarkers[id].setLatLng([lat, lng]);
      }
    }
  });

  // ---------------------------------------------------------
  // HUNTERS (RED, EXCEPT SELF = BLUE)
  // ---------------------------------------------------------
  onValue(ref(db, `events/${eventId}/hunters`), snapshot => {
    const data = snapshot.val();
    if (!data) return;

    for (const id in data) {
      const hunter = data[id];
      const latest = hunter.latest;

      if (!latest) {
        removeMarker(hunterMarkers, id);
        continue;
      }

      const { lat, lng } = latest;

      const isMe = (id === myHunterId);

      const iconHtml = isMe
        ? `<div class="hunter-blue"></div>`
        : `<div class="hunter-red"></div>`;

      if (!hunterMarkers[id]) {
        hunterMarkers[id] = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html: iconHtml,
            iconSize: [20, 20],
            iconAnchor: [10, 10]
          })
        }).addTo(map);
      } else {
        hunterMarkers[id].setLatLng([lat, lng]);
      }
    }
  });

</script>

</body>
</html>
