<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hunter Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    #map { height: calc(100vh - 50px); }
    #controls {
      height: 50px;
      padding: 10px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .runner-yellow {
      width: 26px;
      height: 26px;
      background: #FFD500;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    .runner-red {
      width: 26px;
      height: 26px;
      background: red;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      color: white;
    }

    .history-grey {
      width: 12px;
      height: 12px;
      background: #888;
      border-radius: 50%;
      border: 1px solid #333;
    }

    .history-red {
      width: 12px;
      height: 12px;
      background: red;
      border-radius: 50%;
      border: 1px solid #333;
    }

    .history-latest {
      width: 26px;
      height: 26px;
      background: #FFD500;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    .hunter-lightblue {
      width: 18px;
      height: 18px;
      background: #66B2FF;
      border-radius: 50%;
      border: 2px solid white;
    }

    .hunter-darkblue {
      width: 20px;
      height: 20px;
      background: #0050FF;
      border-radius: 50%;
      border: 2px solid white;
    }
  </style>
</head>

<body>

<div id="controls">
  <label for="viewSelect">View:</label>
  <select id="viewSelect">
    <option value="current">Current</option>
  </select>
</div>

<div id="map"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "...",
    authDomain: "manhunt-e6f98.firebaseapp.com",
    databaseURL: "https://manhunt-e6f98-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "manhunt-e6f98",
    storageBucket: "manhunt-e6f98.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const params = new URLSearchParams(location.search);
  const eventId = params.get("event") || "testEvent";
  const myHunterId = params.get("me") || null;

  const map = L.map('map').setView([47.05, 8.30], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const runnerMarkers = {};
  const hunterMarkers = {};

  let myLiveMarker = null;

  let historyMarkers = [];
  let historyPolyline = null;
  let historyRef = null;

  let latestRunnersSnapshot = null;

  function removeMarker(store, id) {
    if (store[id]) {
      map.removeLayer(store[id]);
      delete store[id];
    }
  }

  // ---------------------------------------------------------
  // LOCAL GPS FOR MYSELF
  // ---------------------------------------------------------
  if (myHunterId) {
    navigator.geolocation.watchPosition(pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      if (!myLiveMarker) {
        myLiveMarker = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html: `<div class="hunter-darkblue"></div>`,
            iconSize: [20, 20],
            iconAnchor: [10, 10]
          })
        }).addTo(map);
      } else {
        myLiveMarker.setLatLng([lat, lng]);
      }
    }, err => {
      console.warn("GPS error:", err);
    }, { enableHighAccuracy: true });
  }

  // ---------------------------------------------------------
  // HUNTERS (EXCEPT MYSELF)
  // ---------------------------------------------------------
  onValue(ref(db, `events/${eventId}/hunters`), snapshot => {
    const data = snapshot.val() || {};

    // Remove hunters that disappeared
    for (const id in hunterMarkers) {
      if (!data[id]) removeMarker(hunterMarkers, id);
    }

    for (const id in data) {
      const hunter = data[id];
      const latest = hunter.latest;

      if (!latest) {
        removeMarker(hunterMarkers, id);
        continue;
      }

      // 🔥 If this is me, ensure NO Firebase marker exists
      if (id === myHunterId) {
        removeMarker(hunterMarkers, id);
        continue;
      }

      // Other hunters (light blue)
      const { lat, lng } = latest;
      const html = `<div class="hunter-lightblue"></div>`;

      if (!hunterMarkers[id]) {
        hunterMarkers[id] = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
          })
        }).addTo(map);
      } else {
        hunterMarkers[id].setLatLng([lat, lng]);
      }
    }
  });

  // ---------------------------------------------------------
  // RUNNERS
  // ---------------------------------------------------------
  const runnersRef = ref(db, `events/${eventId}/runners`);
  onValue(runnersRef, snapshot => {
    const data = snapshot.val() || {};
    latestRunnersSnapshot = data;

    const viewSelect = document.getElementById("viewSelect");

    const existing = new Set();
    for (let i = 0; i < viewSelect.options.length; i++) {
      existing.add(viewSelect.options[i].value);
    }

    for (const id in data) {
      if (!existing.has(id)) {
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = id;
        viewSelect.appendChild(opt);
      }
    }

    if (viewSelect.value === "current") {
      renderCurrentFromCache();
    }
  });

  function renderCurrentFromCache() {
    if (!latestRunnersSnapshot) return;

    for (const id in runnerMarkers) {
      removeMarker(runnerMarkers, id);
    }

    for (const id in latestRunnersSnapshot) {
      const runner = latestRunnersSnapshot[id];
      const status = runner.status || "active";
      const latest = runner.latest;

      if (status !== "active" || !latest) continue;

      const { lat, lng } = latest;
      const number = id.replace("runner", "");
      const isLive = runner.liveMode === true;

      const html = isLive
        ? `<div class="runner-red">${number}</div>`
        : `<div class="runner-yellow">${number}</div>`;

      runnerMarkers[id] = L.marker([lat, lng], {
        icon: L.divIcon({
          className: "",
          html,
          iconSize: [26, 26],
          iconAnchor: [13, 13]
        })
      }).addTo(map);
    }
  }

  // ---------------------------------------------------------
  // HISTORY MODE
  // ---------------------------------------------------------
  function clearHistoryMode() {
    if (historyRef) {
      off(historyRef);
      historyRef = null;
    }

    historyMarkers.forEach(m => map.removeLayer(m));
    historyMarkers = [];

    if (historyPolyline) {
      map.removeLayer(historyPolyline);
      historyPolyline = null;
    }
  }

  function enterHistoryMode(runnerId) {
    clearHistoryMode();

    for (const id in runnerMarkers) {
      removeMarker(runnerMarkers, id);
    }

    historyRef = ref(db, `events/${eventId}/runners/${runnerId}/history`);

    onValue(historyRef, snapshot => {
      const data = snapshot.val() || {};

      historyMarkers.forEach(m => map.removeLayer(m));
      historyMarkers = [];

      const points = [];
      const entries = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);

      const number = runnerId.replace("runner", "");

      entries.forEach((entry, idx) => {
        const { lat, lng, speedhunt } = entry;
        points.push([lat, lng]);

        let html;
        if (idx === entries.length - 1) {
          html = `<div class="history-latest">${number}</div>`;
        } else if (speedhunt) {
          html = `<div class="history-red"></div>`;
        } else {
          html = `<div class="history-grey"></div>`;
        }

        const marker = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html,
            iconSize: idx === entries.length - 1 ? [26, 26] : [12, 12],
            iconAnchor: idx === entries.length - 1 ? [13, 13] : [6, 6]
          })
        }).addTo(map);

        historyMarkers.push(marker);
      });

      if (historyPolyline) map.removeLayer(historyPolyline);
      historyPolyline = L.polyline(points, { color: "#666", weight: 3 }).addTo(map);
    });
  }

  // ---------------------------------------------------------
  // VIEW SWITCHING
  // ---------------------------------------------------------
  document.getElementById("viewSelect").onchange = e => {
    const mode = e.target.value;

    if (mode === "current") {
      clearHistoryMode();
      renderCurrentFromCache();
    } else {
      enterHistoryMode(mode);
    }
  };
</script>

</body>
</html>
