<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hunter Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "...",
    authDomain: "manhunt-e6f98.firebaseapp.com",
    databaseURL: "https://manhunt-e6f98-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "manhunt-e6f98",
    storageBucket: "manhunt-e6f98.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const params = new URLSearchParams(location.search);
  const eventId = params.get("event") || "testEvent";

  const map = L.map('map').setView([47.05, 8.30], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const markers = {};

  // Remove a marker safely
  function removeMarker(id) {
    if (markers[id]) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  }

  // Main listener for runner updates
  onValue(ref(db, `events/${eventId}/runners`), snapshot => {
    const data = snapshot.val();
    if (!data) return;

    for (const id in data) {
      const runner = data[id];
      const status = runner.status || "active";

      // Hidden/out runners → no marker
      if (status !== "active") {
        removeMarker(id);
        continue;
      }

      if (!runner.latest) {
        removeMarker(id);
        continue;
      }

      const { lat, lng, timestamp } = runner.latest;
      const label = `${id} (updated ${Math.round((Date.now() - timestamp)/60000)} min ago)`;

      // Create or update marker
      if (!markers[id]) {
        markers[id] = L.marker([lat, lng]).addTo(map).bindPopup(label);
      } else {
        markers[id].setLatLng([lat, lng]);
        markers[id].setPopupContent(label);
      }
    }
  });
</script>

</body>
</html>
