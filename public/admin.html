<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Dashboard</title>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    h2 { margin-bottom: 5px; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 8px; border-bottom: 1px solid #ccc; }

    th:nth-child(1), td:nth-child(1) { text-align: left; }
    th:nth-child(2), td:nth-child(2),
    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4) { text-align: center; }

    select { padding: 5px; }
    button { padding: 5px 10px; cursor: pointer; }

    .row-live { background: #ffb3b3; }
    .row-hidden { background: #d9ecff; }
    .row-out { background: #e0e0e0; }
  </style>
</head>

<body>

<h2>Event Dashboard</h2>
<p>Manage runner statuses, speedhunt pings, and monitor hunters.</p>

<label>Event ID: </label>
<input id="eventInput" />
<button id="loadBtn">Load Event</button>

<!-- GM MAP LINK -->
<div style="margin-top:10px;">
  <a id="gmMapLink" href="#" target="_blank" style="font-weight:bold; color:#0050ff;">
    Open Game Master Map
  </a>
</div>

<script>
  const eventInputEl = document.getElementById("eventInput");
  const gmLink = document.getElementById("gmMapLink");

  function updateGMMapLink() {
    const eventId = eventInputEl.value.trim();
    if (!eventId) {
      gmLink.href = "#";
      gmLink.textContent = "Open Game Master Map";
      return;
    }
    gmLink.href = `https://manhunt-e6f98.web.app/gm.html?event=${eventId}`;
    gmLink.textContent = `Open GM Map for "${eventId}"`;
  }

  eventInputEl.addEventListener("input", updateGMMapLink);
  updateGMMapLink();
</script>

<!-- RUNNER TABLE -->
<table id="runnerTable" style="display:none;">
  <thead>
    <tr>
      <th>Runner ID</th>
      <th>Last Update</th>
      <th>Status</th>
      <th>Speedhunt</th>
    </tr>
  </thead>
  <tbody id="runnerBody"></tbody>
</table>

<!-- EMBEDDED RUNNER MAP -->
<h3 style="margin-top:30px;">Live Runner Map</h3>

<label style="display:block; margin-top:10px;">
  <input type="checkbox" id="showOthersCheckbox" checked>
  Show other runners
</label>

<iframe 
  id="runnerMapFrame"
  src="runner.html?event=testEvent"
  style="width:100%; height:500px; border:1px solid #ccc; margin-top:10px;">
</iframe>

<!-- HUNTER TABLE -->
<table id="hunterTable" style="display:none;">
  <thead>
    <tr>
      <th>Hunter ID</th>
      <th>Last Update</th>
    </tr>
  </thead>
  <tbody id="hunterBody"></tbody>
</table>

<!-- EMBEDDED HUNTER MAP -->
<h3 style="margin-top:30px;">Live Hunter Map</h3>
<iframe 
  id="hunterMapFrame"
  src="hunter.html?event=testEvent"
  style="width:100%; height:500px; border:1px solid #ccc; margin-top:10px;">
</iframe>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "...",
    authDomain: "manhunt-e6f98.firebaseapp.com",
    databaseURL: "https://manhunt-e6f98-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "manhunt-e6f98",
    storageBucket: "manhunt-e6f98.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const loadBtn = document.getElementById("loadBtn");
  const eventInput = document.getElementById("eventInput");

  const runnerTable = document.getElementById("runnerTable");
  const runnerBody = document.getElementById("runnerBody");

  const hunterTable = document.getElementById("hunterTable");
  const hunterBody = document.getElementById("hunterBody");

  const runnerMapFrame = document.getElementById("runnerMapFrame");
  const hunterMapFrame = document.getElementById("hunterMapFrame");
  const showOthersCheckbox = document.getElementById("showOthersCheckbox");

  let settingsUnsub = null;

  // AUTO-LOAD testEvent
  window.onload = () => {
    eventInput.value = "testEvent";
    updateGMMapLink();
    loadEvent("testEvent");
  };

  loadBtn.onclick = () => {
    const eventId = eventInput.value.trim() || "testEvent";
    updateGMMapLink();
    loadEvent(eventId);
  };

  // Checkbox writes to Firebase
  showOthersCheckbox.onchange = () => {
    const eventId = eventInput.value.trim() || "testEvent";
    update(ref(db, `events/${eventId}/settings`), {
      showOtherRunners: showOthersCheckbox.checked
    });
  };

  function loadEvent(eventId) {
    loadRunners(eventId);
    loadHunters(eventId);

    // Update map sources for this event
    runnerMapFrame.src = `runner.html?event=${eventId}`;
    hunterMapFrame.src = `hunter.html?event=${eventId}`;

    // Clean up previous settings listener
    if (settingsUnsub) {
      settingsUnsub();
      settingsUnsub = null;
    }

    // Listen to showOtherRunners for this event to keep checkbox in sync
    const settingsRef = ref(db, `events/${eventId}/settings/showOtherRunners`);
    settingsUnsub = onValue(settingsRef, snap => {
      const val = snap.val();
      const show = val !== false; // default true
      showOthersCheckbox.checked = show;
    });
  }

  // LOAD RUNNERS
  function loadRunners(eventId) {
    const runnersRef = ref(db, `events/${eventId}/runners`);

    onValue(runnersRef, snapshot => {
      const data = snapshot.val();
      runnerBody.innerHTML = "";
      runnerTable.style.display = "table";

      if (!data) return;

      const sorted = Object.keys(data).sort((a, b) => {
        const numA = parseInt(a.replace(/\D/g, "")) || 0;
        const numB = parseInt(b.replace(/\D/g, "")) || 0;
        return numA - numB;
      });

      for (const id of sorted) {
        const runner = data[id];
        const latest = runner.latest;
        const status = runner.status || "active";
        const live = runner.liveMode === true;

        const lastUpdate = latest
          ? Math.round((Date.now() - latest.timestamp) / 60000) + " min ago"
          : "No data";

        const row = document.createElement("tr");

        if (live) row.classList.add("row-live");
        else if (status === "hidden") row.classList.add("row-hidden");
        else if (status === "out") row.classList.add("row-out");

        row.innerHTML = `
          <td>${id}</td>
          <td>${lastUpdate}${live ? " (LIVE)" : ""}</td>
          <td>
            <select data-id="${id}">
              <option value="active" ${status === "active" ? "selected" : ""}>active</option>
              <option value="hidden" ${status === "hidden" ? "selected" : ""}>hidden</option>
              <option value="out" ${status === "out" ? "selected" : ""}>out</option>
            </select>
          </td>
          <td>
            <button class="pingBtn" data-id="${id}">Speedhunt Ping</button>
          </td>
        `;

        runnerBody.appendChild(row);
      }

      document.querySelectorAll("select").forEach(sel => {
        sel.onchange = () => {
          update(ref(db, `events/${eventId}/runners/${sel.dataset.id}`), {
            status: sel.value
          });
        };
      });

      document.querySelectorAll(".pingBtn").forEach(btn => {
        btn.onclick = () => {
          update(ref(db, `events/${eventId}/runners/${btn.dataset.id}`), {
            speedhuntPing: Date.now()
          });
        };
      });
    });
  }

  // LOAD HUNTERS
  function loadHunters(eventId) {
    const huntersRef = ref(db, `events/${eventId}/hunters`);

    onValue(huntersRef, snapshot => {
      const data = snapshot.val();
      hunterBody.innerHTML = "";
      hunterTable.style.display = "table";

      if (!data) return;

      const sorted = Object.keys(data).sort((a, b) => {
        const numA = parseInt(a.replace(/\D/g, "")) || 0;
        const numB = parseInt(b.replace(/\D/g, "")) || 0;
        return numA - numB;
      });

      for (const id of sorted) {
        const hunter = data[id];
        const latest = hunter.latest;

        const lastUpdate = latest
          ? Math.round((Date.now() - latest.timestamp) / 60000) + " min ago"
          : "No data";

        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${id}</td>
          <td>${lastUpdate}</td>
        `;

        hunterBody.appendChild(row);
      }
    });
  }
</script>

</body>
</html>
