<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Master Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { height: calc(100vh - 50px); }
    #controls {
      height: 50px;
      background: #f0f0f0;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .runner-yellow {
      width: 26px;
      height: 26px;
      background: #FFD500;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .runner-red {
      width: 26px;
      height: 26px;
      background: red;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }

    .hunter-lightblue {
      width: 18px;
      height: 18px;
      background: #66B2FF;
      border-radius: 50%;
      border: 2px solid white;
    }

    .hunter-darkblue {
      width: 20px;
      height: 20px;
      background: #0050FF;
      border-radius: 50%;
      border: 2px solid white;
    }
  </style>
</head>

<body>

<div id="controls">
  <strong>Game Master Map</strong>
</div>

<div id="map"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "...",
    authDomain: "manhunt-e6f98.firebaseapp.com",
    databaseURL: "https://manhunt-e6f98-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "manhunt-e6f98",
    storageBucket: "manhunt-e6f98.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const params = new URLSearchParams(location.search);
  const eventId = params.get("event") || "testEvent";

  const map = L.map('map').setView([47.05, 8.30], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const runnerMarkers = {};
  const hunterMarkers = {};

  // ---------------------------------------------------------
  // HUNTERS
  // ---------------------------------------------------------
  onValue(ref(db, `events/${eventId}/hunters`), snapshot => {
    const data = snapshot.val() || {};

    for (const id in hunterMarkers) {
      if (!data[id]) {
        map.removeLayer(hunterMarkers[id]);
        delete hunterMarkers[id];
      }
    }

    for (const id in data) {
      const latest = data[id].latest;
      if (!latest) continue;

      const { lat, lng } = latest;

      const html = `<div class="hunter-lightblue"></div>`;

      if (!hunterMarkers[id]) {
        hunterMarkers[id] = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
          })
        }).addTo(map);
      } else {
        hunterMarkers[id].setLatLng([lat, lng]);
      }
    }
  });

  // ---------------------------------------------------------
  // RUNNERS (GM sees memory = real-time)
  // ---------------------------------------------------------
  onValue(ref(db, `events/${eventId}/runners`), snapshot => {
    const data = snapshot.val() || {};

    for (const id in runnerMarkers) {
      if (!data[id]) {
        map.removeLayer(runnerMarkers[id]);
        delete runnerMarkers[id];
      }
    }

    for (const id in data) {
      const mem = data[id].memory;
      if (!mem) continue;

      const { lat, lng } = mem;
      const number = id.replace("runner", "");
      const isLive = data[id].liveMode === true;

      const html = isLive
        ? `<div class="runner-red">${number}</div>`
        : `<div class="runner-yellow">${number}</div>`;

      if (!runnerMarkers[id]) {
        runnerMarkers[id] = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html,
            iconSize: [26, 26],
            iconAnchor: [13, 13]
          })
        }).addTo(map);
      } else {
        runnerMarkers[id].setLatLng([lat, lng]);
        runnerMarkers[id].setIcon(
          L.divIcon({
            className: "",
            html,
            iconSize: [26, 26],
            iconAnchor: [13, 13]
          })
        );
      }
    }
  });
</script>

</body>
</html>
